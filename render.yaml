services:
  - type: web
    name: winback-backend
    env: docker
    branch: main
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        value: ""
      - key: DATABASE_URL
        fromDatabase:
          name: winback-db

databases:
  - name: winback-db
    engine: postgresql
    plan: starter
    version: "15"
